<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Soporte Técnico</title>
  <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../css/kika.css">
  <style>
    /* ── Semáforo de prioridad ─────────────────────────────────── */
    .priority-group {
      display: flex; gap: 10px; margin-top: 6px;
    }
    .priority-btn {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      gap: 6px; padding: 12px 8px; border-radius: 12px;
      border: 2px solid transparent; cursor: pointer;
      font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 700;
      transition: all .2s; background: var(--gray-lt); color: var(--text-sec);
    }
    .priority-btn .dot {
      width: 22px; height: 22px; border-radius: 50%;
      transition: box-shadow .2s; opacity: .35;
    }
    /* Urgente */
    .priority-btn[data-p="Urgente"] .dot  { background: #ef4444; }
    .priority-btn[data-p="Urgente"]:hover,
    .priority-btn[data-p="Urgente"].active {
      border-color: #ef4444; background: #ffeaea; color: #b91c1c;
    }
    .priority-btn[data-p="Urgente"].active .dot { opacity:1; box-shadow: 0 0 0 4px #fca5a5; }
    /* Importante */
    .priority-btn[data-p="Importante"] .dot { background: #f59e0b; }
    .priority-btn[data-p="Importante"]:hover,
    .priority-btn[data-p="Importante"].active {
      border-color: #f59e0b; background: #fff8e1; color: #92400e;
    }
    .priority-btn[data-p="Importante"].active .dot { opacity:1; box-shadow: 0 0 0 4px #fde68a; }
    /* Leve */
    .priority-btn[data-p="Leve"] .dot { background: #22c55e; }
    .priority-btn[data-p="Leve"]:hover,
    .priority-btn[data-p="Leve"].active {
      border-color: #22c55e; background: #eafaf1; color: #15803d;
    }
    .priority-btn[data-p="Leve"].active .dot { opacity:1; box-shadow: 0 0 0 4px #86efac; }

    /* ── Tarjetas de tickets propios ───────────────────────────── */
    .my-ticket {
      border: 1.5px solid var(--gray-mid); border-radius: 12px;
      padding: 14px 16px; margin-bottom: 10px;
      display: flex; gap: 12px; align-items: flex-start;
      transition: box-shadow .2s;
    }
    .my-ticket:hover { box-shadow: 0 2px 12px rgba(26,107,124,.08); }
    .priority-dot {
      width: 10px; height: 10px; border-radius: 50%; margin-top: 5px; flex-shrink: 0;
    }
    .dot-Urgente   { background: #ef4444; box-shadow: 0 0 0 3px #fca5a540; }
    .dot-Importante{ background: #f59e0b; box-shadow: 0 0 0 3px #fde68a40; }
    .dot-Leve      { background: #22c55e; box-shadow: 0 0 0 3px #86efac40; }
    .ticket-ref    { font-size: 11px; color: var(--text-sec); margin-top: 2px; }
    .badge-p {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 2px 9px; border-radius: 20px; font-size: 10px; font-weight: 700;
    }
    .bp-Urgente    { background:#ffeaea; color:#b91c1c; }
    .bp-Importante { background:#fff8e1; color:#92400e; }
    .bp-Leve       { background:#eafaf1; color:#15803d; }
    .bs-Pendiente  { background:#fff8e1; color:#92400e; }
    .bs-proceso    { background:#e6f4f7; color:var(--teal); }
    .bs-Resuelto   { background:#eafaf1; color:#15803d; }
  </style>
</head>
<body class="page-support">

<div class="support-card">
  <div class="support-card-header">
    <h2><i class="ri-customer-service-2-line"></i> Soporte Técnico</h2>
    <p>Mis tickets reportados</p>
  </div>

  <div class="support-card-body">

    <!-- Lista de mis tickets -->
    <div id="estadoCarga" style="text-align:center;padding:20px;font-size:13px;color:var(--text-sec)">
      <i class="ri-loader-4-line"></i> Cargando tickets...
    </div>
    <div id="listaTickets" style="display:none"></div>

    <!-- Formulario nuevo ticket -->
    <div class="ticket-form">
      <h3><i class="ri-add-circle-line"></i> Reportar nuevo problema</h3>
      <form id="frmTicket" novalidate>

        <!-- Módulo -->
        <div style="margin-bottom:12px">
          <div class="field-label">Módulo afectado</div>
          <select class="field-input" id="modulo">
            <option value="" disabled selected>Seleccionar módulo</option>
            <option>Login / Acceso</option>
            <option>Gestión de usuarios</option>
            <option>Materia Prima / Insumos</option>
            <option>Colección</option>
            <option>Prendas</option>
            <option>Costeo</option>
            <option>Consultas</option>
            <option>Otro</option>
          </select>
        </div>

        <!-- Prioridad — semáforo -->
        <div style="margin-bottom:14px">
          <div class="field-label">Prioridad</div>
          <div class="priority-group" id="priorityGroup">
            <button type="button" class="priority-btn" data-p="Leve" onclick="selPrioridad(this)">
              <div class="dot"></div>
              <span>🟢 Leve</span>
            </button>
            <button type="button" class="priority-btn" data-p="Importante" onclick="selPrioridad(this)">
              <div class="dot"></div>
              <span>🟡 Importante</span>
            </button>
            <button type="button" class="priority-btn active" data-p="Urgente" onclick="selPrioridad(this)">
              <div class="dot"></div>
              <span>🔴 Urgente</span>
            </button>
          </div>
        </div>

        <!-- Descripción -->
        <div style="margin-bottom:12px">
          <div class="field-label">Descripción del problema *</div>
          <textarea class="field-input" id="descripcion" rows="3"
            placeholder="Describe con detalle el problema..."></textarea>
          <div class="field-error" id="err-descripcion"></div>
        </div>

        <div class="form-actions" style="border-top:none;padding-top:0;margin-top:0">
          <button type="submit" class="btn btn-secondary">
            <i class="ri-send-plane-line"></i> Enviar reporte
          </button>
        </div>
      </form>
    </div>

  </div>
</div>

<div class="toast-container" id="toastContainer"></div>
<script src="../../js/kika.js"></script>
<script>
  requireAuth();

  let prioridadSeleccionada = 'Urgente';

  function selPrioridad(btn) {
    document.querySelectorAll('.priority-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    prioridadSeleccionada = btn.dataset.p;
  }

  async function cargarTickets() {
    try {
      const res  = await fetch(`${API_URL}/soporte/mis-tickets`, {
        headers: { 'Authorization': `Bearer ${getToken()}` }
      });
      const data = await res.json();
      renderTickets(data.ok ? data.data : []);
    } catch { renderTickets([]); }
  }

  function renderTickets(tickets) {
    const lista = document.getElementById('listaTickets');

    if (!tickets.length) {
      lista.innerHTML = '<p style="text-align:center;color:var(--text-sec);font-size:13px;padding:12px 0">No tienes tickets reportados aún.</p>';
    } else {
      lista.innerHTML = tickets.map(t => {
        const p = t.prioridad || 'Leve';
        const fecha = t.fecha_creacion
          ? new Date(t.fecha_creacion).toLocaleDateString('es-CO',
              { day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' })
          : '—';
        const esBadge = t.estado === 'En proceso' ? 'bs-proceso'
                      : t.estado === 'Resuelto'   ? 'bs-Resuelto' : 'bs-Pendiente';
        return `
          <div class="my-ticket">
            <div class="priority-dot dot-${p}"></div>
            <div style="flex:1">
              <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">
                <div style="font-weight:700;font-size:13px;color:var(--navy)">${t.asunto || t.modulo || 'Ticket'}</div>
                <div style="display:flex;gap:5px;flex-shrink:0">
                  <span class="badge-p bp-${p}">● ${p}</span>
                  <span class="badge-p ${esBadge}">${t.estado}</span>
                </div>
              </div>
              <div class="ticket-ref"><i class="ri-time-line"></i> ${fecha}</div>
              <p style="font-size:12px;color:var(--text);margin:6px 0 0">${t.descripcion}</p>
            </div>
          </div>`;
      }).join('');
    }

    document.getElementById('estadoCarga').style.display = 'none';
    lista.style.display = 'block';
  }

  document.getElementById('frmTicket').addEventListener('submit', async (e) => {
    e.preventDefault();
    const desc   = document.getElementById('descripcion');
    const errEl  = document.getElementById('err-descripcion');
    const modulo = document.getElementById('modulo').value || 'Sin especificar';

    if (!desc.value.trim()) {
      desc.classList.add('error');
      errEl.textContent  = 'Describe el problema';
      errEl.style.display = 'block';
      return;
    }
    desc.classList.remove('error');
    errEl.style.display = 'none';

    try {
      const res  = await fetch(`${API_URL}/soporte`, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${getToken()}` },
        body: JSON.stringify({
          modulo,
          descripcion: desc.value.trim(),
          prioridad:   prioridadSeleccionada
        })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.message);
      toast('Reporte enviado correctamente', 'success');
      e.target.reset();
      prioridadSeleccionada = 'Urgente';
      document.querySelectorAll('.priority-btn').forEach(b => b.classList.remove('active'));
      document.querySelector('[data-p="Urgente"]').classList.add('active');
      await cargarTickets();
    } catch (err) {
      toast('Error al enviar: ' + err.message, 'error');
    }
  });

  cargarTickets();
</script>
</body>
</html>
