<!DOCTYPE html>
<!--
  producto.html — Módulo de Costeo Textil PF-FW 2026
  Se carga dentro del iframe de Interfas_Admin.html
  NO tiene login propio: toma el token y rol del shell padre (window.parent)
  Roles permitidos: 4 (Admin), 1 (Materia Prima), 2 (Costeo)
-->
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>KV · Costeo Textil</title>
  <!-- Fuentes: IBM Plex Mono para números/tablas, DM Sans para textos generales -->
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <!-- Estilos generales de la app y estilos específicos del módulo de costeo -->
  <link rel="stylesheet" href="../../css/kika.css">
  <link rel="stylesheet" href="../../css/costeo.css">
<style>
  #topbar { display: none !important; }

  html, body {
    height: 100%;
    margin: 0;
    padding: 0;
    overflow: auto;
  }

  /* Toolbar fijo en Y — se mueve horizontalmente con el scroll del body */
  #module-toolbar {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 200;
    /* El ancho real lo maneja el JS al inyectar el toolbar */
  }

  /* Empuja el contenido hacia abajo para que no quede tapado por el toolbar.
     El valor se actualiza dinámicamente desde JS según la altura real del toolbar. */
  #toolbar-spacer {
    height: 0px;
    flex-shrink: 0;
  }

  #content {
    height: auto;
    overflow: visible;
    min-width: max-content;
  }

  .pane {
    height: auto;
    overflow: visible;
    min-width: max-content;
  }

  /* La columna Referencia (.fr) no puede usar `position:sticky` aquí porque
     el scroll horizontal real ocurre en <body>, no en .xgrid-wrap (que
     crece junto con su contenido por min-width:max-content). En su lugar,
     se usa `position:relative` + `transform:translateX()` aplicado por JS
     (ver syncStickyRef más abajo) para simular el efecto de columna fija. */
  .xgrid th.fr, .xgrid td.fr {
    position: relative !important;
    z-index: 50;
    will-change: transform;
  }
</style>
</head>
<body>

<!-- ── BARRA SUPERIOR INTERNA (OCULTA) ────────────────────────
     Esta barra existe para cuando el módulo se usa de forma independiente
     (sin el shell). Cuando se carga en el iframe se oculta con CSS. -->
<div id="topbar">
  <div class="brand">KV</div>
  <div class="subtitle">Costeo Textil · PF-FW 2026</div>
  <div class="spacer"></div>
  <!-- Caja para ingresar la TRM (tasa de cambio COP/USD) -->
  <div class="top-trm" id="trm-box" style="display:none">
    TRM $<input id="g-trm" type="number" value="3700" onchange="onTrmChange(this.value)"> COP/USD
  </div>
  <!-- Chip con el nombre y rol del usuario actual -->
  <div class="user-chip" id="user-chip">
    <div class="role-dot" id="role-dot"></div>
    <span id="user-label"></span>
  </div>
  <!-- Botones opcionales: cargar demo y exportar CSV -->
  <button class="top-btn amber" id="btn-demo" onclick="loadDemo()" style="display:none">▶ Cargar Demo</button>
  <button class="top-btn" id="btn-csv" onclick="exportCSV()" style="display:none">⬇ CSV</button>
</div>

<!-- ── PESTAÑAS DE NAVEGACIÓN ─────────────────────────────────
     Se generan dinámicamente desde JavaScript según el rol del usuario.
     Ejemplos: Colecciones, Telas & Insumos, Consolidado, Canal de Venta, Consulta, Historial -->
<div id="tabstrip"></div>

<div id="module-toolbar"></div>
<!-- Espaciador dinámico: empuja el contenido para que no quede bajo el toolbar fijo -->
<div id="toolbar-spacer"></div>

<!-- ── ÁREA DE CONTENIDO ─────────────────────────────────────
     Aquí se carga el "pane" (panel) de la pestaña activa.
     Cada pane tiene su propio archivo JS (ej. pane-telas.js). -->
<div id="content"></div>


<!-- ── MODAL: INSUMOS FIJOS ──────────────────────────────────
     Se abre desde cualquier parte del módulo para gestionar los
     insumos que se aplican automáticamente a TODAS las prendas. -->
<div id="fijos-modal" class="modal-bg" style="display:none">
  <div class="modal">
    <div class="modal-head">
      <h3>⚙ Insumos Fijos — Aplican a TODAS las referencias</h3>
      <!-- Botón cerrar el modal -->
      <button class="btn-del" onclick="closeFijosModal()">✕</button>
    </div>
    <div class="modal-body">
      <p style="font-size:11px;color:var(--tx3);margin-bottom:10px">
        Se suman automáticamente a cada prenda. Cambia precio o cantidad → el consolidado se recalcula.
      </p>
      <!-- Tabla de insumos fijos: se llena dinámicamente desde JS -->
      <table class="xgrid" style="width:100%">
        <thead><tr>
          <th>Insumo Fijo</th>
          <th class="num">Precio/Unid</th>
          <th class="num">Cantidad</th>
          <th class="num ttl">TTL/Prenda</th>
          <th style="width:28px"></th>
        </tr></thead>
        <tbody id="fijos-body"></tbody>
        <!-- Fila de totales al pie de la tabla -->
        <tfoot><tr>
          <td colspan="3" style="text-align:right;padding:6px 8px;font-weight:700;font-size:11px">TOTAL FIJOS/PRENDA</td>
          <td class="ttl num" style="padding:4px 8px;font-family:var(--mono);font-weight:700" id="fijos-total-modal">$ 0</td>
          <td></td>
        </tr></tfoot>
      </table>
      <div style="margin-top:10px;display:flex;gap:8px">
        <!-- Botón para agregar una fila vacía nueva -->
        <button class="btn btn-o btn-sm" onclick="addFijoRow()">+ Agregar</button>
        <!-- Botón para cargar los insumos por defecto que vienen del Excel original -->
        <button class="btn btn-o btn-sm" onclick="seedFijos()">Cargar defaults Excel</button>
      </div>
    </div>
    <div class="modal-foot">
      <!-- Cerrar aplica los cambios (el recálculo es automático al modificar los campos) -->
      <button class="btn btn-g" onclick="closeFijosModal()">Aplicar y cerrar</button>
    </div>
  </div>
</div>


<!-- ── MODAL: COLECCIÓN ───────────────────────────────────────
     Se usa tanto para crear una nueva colección como para editar una existente.
     El título cambia según el caso ("Nueva Colección" o "Editar Colección"). -->
<div id="col-modal" class="modal-bg" style="display:none">
  <div class="modal" style="width:480px">
    <div class="modal-head">
      <!-- El título se actualiza desde JavaScript -->
      <h3 id="col-modal-title">Nueva Colección</h3>
      <button class="btn-del" onclick="closeColModal()">✕</button>
    </div>
    <div class="modal-body">
      <div style="display:flex;flex-direction:column;gap:12px">
        <!-- Nombre de la colección -->
        <div class="fg">
          <label>Nombre colección</label>
          <input id="cm-name" placeholder="PRE-FALL 26" style="width:100%">
        </div>
        <!-- Temporada y año en la misma fila -->
        <div style="display:flex;gap:10px">
          <div class="fg" style="flex:1">
            <label>Temporada</label>
            <select id="cm-season">
              <option>PF</option><option>FW</option>
              <option>SS</option><option>RT</option>
            </select>
          </div>
          <div class="fg" style="flex:1">
            <label>Año</label>
            <input id="cm-year" type="number" value="2026">
          </div>
        </div>
        <!-- Descripción opcional -->
        <div class="fg">
          <label>Descripción</label>
          <input id="cm-desc" placeholder="Descripción opcional…" style="width:100%">
        </div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-o" onclick="closeColModal()">Cancelar</button>
      <!-- Guardar llama a saveCollection() que maneja tanto crear como editar -->
      <button class="btn btn-g" onclick="saveCollection()">Guardar</button>
    </div>
  </div>
</div>


<!-- Área donde aparecen las notificaciones tipo "toast" (mensajes flotantes) -->
<div id="toast"></div>


<!-- ── SCRIPTS DEL MÓDULO (el orden importa) ─────────────────
     Cada archivo maneja una responsabilidad específica:
     utils     → funciones de utilidad (formato de moneda, fechas, etc.)
     state     → estado global compartido entre todos los panes
     calculator→ lógica de cálculo de costos
     auth      → validación de acceso dentro del módulo
     pane-*    → cada archivo maneja el contenido de una pestaña
     demo      → datos de prueba para modo demo
     app       → inicializa todo y conecta las piezas -->
<script src="../../js/utils.js"></script>
<script src="../../js/state.js"></script>
<script src="../../js/calculator.js"></script>
<script src="../../js/pane-colecciones.js"></script>
<script src="../../js/pane-telas.js"></script>
<script src="../../js/pane-insumos.js"></script>
<script src="../../js/pane-consolidado.js"></script>
<script src="../../js/pane-consolidado-escenarios.js"></script>
<script src="../../js/pane-canales.js"></script>
<script src="../../js/pane-consulta.js"></script>
<script src="../../js/pane-historial.js"></script>
<script src="../../js/demo.js"></script>
<script src="../../js/auth.js"></script>   <!-- ← movido AL FINAL -->
<script src="../../js/app.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<script>
  // ── Inicialización: toma los datos de sesión del shell padre ──
  // Este módulo no tiene login propio; recibe todo desde Interfas_Admin.html
  (function initFromKika() {

    const par     = window.parent;
    const token   = par?.kikaToken   || sessionStorage.getItem('kika_token');
    const usuario = par?.kikaUsuario || JSON.parse(sessionStorage.getItem('kika_usuario') || 'null');
    const rolKika = parseInt(par?.kikaRol) || parseInt(sessionStorage.getItem('kika_rol') || '0');

    // Si el padre tenía el token real, sincronizarlo al sessionStorage.
    // Esto evita que una sesión anterior con 'consulta_guest' (valor legacy)
    // quede almacenada y bloquee futuras cargas del módulo.
    if (par?.kikaToken && par.kikaToken !== 'consulta_guest') {
      sessionStorage.setItem('kika_token',   par.kikaToken);
      sessionStorage.setItem('kika_usuario', JSON.stringify(par.kikaUsuario));
      sessionStorage.setItem('kika_rol',     String(par.kikaRol));
    }

    // Sin sesión válida o con token legacy → pantalla de error
    if (!token || !usuario || token === 'consulta_guest') {
      document.body.innerHTML = `
        <div style="display:flex;flex-direction:column;align-items:center;
                    justify-content:center;height:100vh;gap:16px;
                    font-family:'DM Sans',sans-serif;color:#5C574F;background:#EFECE4">
          <div style="font-size:48px">🔒</div>
          <div style="font-size:16px;font-weight:700;color:#1A1714">Sesión no encontrada</div>
          <div style="font-size:13px">Inicia sesión desde el panel principal de Kika.</div>
        </div>`;
      return;
    }

    // Traduce rol numérico Kika → nombre interno del módulo de costeo
    // Kika: 4=admin, 1=materia_prima, 2=finanzas, 3=consulta
    const ROL_MAP   = { 4: 'admin', 1: 'materia_prima', 2: 'finanzas', 3: 'consulta' };
    const rolCosteo = ROL_MAP[rolKika];

    // Rol no reconocido → acceso denegado
    if (!rolCosteo) {
      document.body.innerHTML = `
        <div style="display:flex;flex-direction:column;align-items:center;
                    justify-content:center;height:100vh;gap:16px;
                    font-family:'DM Sans',sans-serif;color:#5C574F;background:#EFECE4">
          <div style="font-size:48px">⛔</div>
          <div style="font-size:16px;font-weight:700;color:#1A1714">Acceso no autorizado</div>
          <div style="font-size:13px">
            El módulo de Costeo está disponible para:<br>
            <b>Administrador · Materia Prima · Costeo</b>
          </div>
        </div>`;
      return;
    }

    // Inyectar usuario en el estado global del módulo
    currentUser = {
      name:  usuario.Nombre,
      role:  rolCosteo,
      token: token,
    };

    // Construye la interfaz (pestañas y contenido según el rol)
    buildUI();

    // Registra en el historial que este usuario accedió al módulo
    addHist('Accedió al módulo de Costeo', 'Login',
      `${usuario.Nombre} (Rol Kika: ${rolKika})`);

  })();

  // Abre directamente la pestaña indicada en la URL
  // Ejemplo: producto.html?tab=materia → abre la pestaña "Telas & Insumos"
  // Guard: si buildUI() ya activó este mismo tab, no volver a construirlo
  const tabParam = new URLSearchParams(window.location.search).get('tab');
  if (tabParam && tabParam !== activeTab) {
    const btn = document.getElementById('tab-' + tabParam);
    if (btn) goTab(tabParam, btn);
  }
</script>

<script>
  // Actualiza el espaciador cada vez que el toolbar cambia de altura
  // (ocurre al cambiar de tab, mostrar/ocultar fijos-summary, etc.)
  function syncToolbarSpacer() {
    const tb = document.getElementById('module-toolbar');
    const sp = document.getElementById('toolbar-spacer');
    if (tb && sp) sp.style.height = tb.offsetHeight + 'px';
  }

  // ── FIJAR COLUMNA REFERENCIA DURANTE EL SCROLL HORIZONTAL ──────────
  // Por qué no basta con `position:sticky` en las celdas `.fr`:
  // En este layout, el scroll horizontal real ocurre en <body>, no dentro
  // de `.xgrid-wrap` (que crece con `min-width:max-content` junto con su
  // contenido). `sticky` solo funciona cuando el ancestro con overflow es
  // más angosto que el contenido; aquí ningún ancestro intermedio cumple
  // esa condición, así que `sticky` no tiene ningún contenedor al que
  // anclarse de forma útil.
  //
  // Solución: igual que el toolbar superior usa `position:fixed` y se
  // mantiene en el viewport mientras el body se desplaza, aplicamos un
  // `transform: translateX()` a cada celda `.fr` que compensa exactamente
  // el scrollLeft del body, haciendo que visualmente queden fijas.
  function syncStickyRef() {
    const x = window.scrollX || document.documentElement.scrollLeft || document.body.scrollLeft || 0;
    document.querySelectorAll('.xgrid th.fr, .xgrid td.fr').forEach(cell => {
      cell.style.transform = x ? `translateX(${x}px)` : '';
    });
  }

  window.addEventListener('scroll', syncStickyRef, { passive: true });

  // Re-sincronizar también cuando cambia el contenido (nuevas filas,
  // cambio de tab, etc.) ya que las celdas se regeneran con innerHTML
  // y pierden el transform aplicado anteriormente.
  const _refObs = new MutationObserver(syncStickyRef);
  document.addEventListener('DOMContentLoaded', () => {
    syncStickyRef();
    _refObs.observe(document.getElementById('content'), { childList: true, subtree: true });
  });
</script>

</body>
</html>
