<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Kika — Panel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../css/kika.css">
  <link rel="stylesheet" href="../../css/shell.css">
</head>

<body class="page-shell">

  <div class="navbar">
    <img src="../../img/LOGO BLANCO.png" alt="Kika" class="logo"
         onerror="this.src='../../img/LOGO NEGRO.png'">

    <nav class="topnav">

      <div class="tn-group">
        <button class="tn-btn" onclick="cargar('../producto/colecciones.html',this)">
          <i class="ri-folder-line"></i> Colecciones
        </button>
      </div>

      <div class="tn-group" id="secUsuarios" style="display:none">
        <button class="tn-btn">
          <i class="ri-user-settings-line"></i> Usuarios
          <i class="ri-arrow-down-s-line"></i>
        </button>
        <div class="tn-dropdown">
          <a href="#" onclick="cargar('../auth/Creacion_Usuario.html',this)">
            <i class="ri-user-add-line"></i> Crear Usuario
          </a>
          <a href="#" onclick="cargar('../auth/Eliminar_Usuario.html',this)">
            <i class="ri-user-unfollow-line"></i> Eliminar Usuario
          </a>
          <a href="#" onclick="cargar('../auth/Bloquear_Usuario.html',this)">
            <i class="ri-user-forbid-line"></i> Bloquear / Desbloquear
          </a>
        </div>
      </div>

      <div class="tn-group" id="secReportes" style="display:none">
        <button class="tn-btn" onclick="cargar('../reportes/Reportes.html', this)">
          <i class="ri-bar-chart-box-line"></i> Reportes
        </button>
      </div>

      <div class="tn-group" id="secCosteo" style="display:none">
        <button class="tn-btn">
          <i class="ri-calculator-line"></i>
          <span id="labelCosteo">Costeo</span>
          <i class="ri-arrow-down-s-line"></i>
        </button>
        <div class="tn-dropdown" id="dropCosteo"></div>
      </div>

      <div class="tn-group" id="secSoporte">
        <button class="tn-btn" onclick="cargar('../soporte/Soporte.html',this)">
          <i class="ri-customer-service-2-line"></i> Soporte
        </button>
      </div>

      <div class="tn-group">
        <button class="tn-btn" onclick="cargar('../producto/consulta.html',this)">
          <i class="ri-search-line"></i> Consulta
        </button>
      </div>

    </nav>

    <div class="navbar-right">
      <div class="user-badge">
        <i class="ri-user-line"></i>
        <span id="nombreUsuario">—</span>
        <span id="rolUsuario" style="opacity:.6;font-size:11px;margin-left:4px"></span>
      </div>
      <button class="btn-logout" id="btnSalir">
        <i class="ri-logout-box-line"></i> Salir
      </button>
    </div>
  </div>

  <div class="content-full">
    <iframe id="frame" src="../producto/colecciones.html"></iframe>
  </div>

  <!-- 1. kika.js primero (define requireAuth, confirmar, ROLES, etc.) -->
  <script src="../../js/kika.js"></script>

  <!-- 2. Lógica de roles — configura display de grupos y llena dropCosteo -->
  <script>
    const sesion = requireAuth([1, 2, 3, 4]);

    document.getElementById('nombreUsuario').textContent = sesion.usuario.Nombre;
    document.getElementById('rolUsuario').textContent    = ROLES[sesion.rol] || '';

    const rol        = sesion.rol;
    const dropCosteo = document.getElementById('dropCosteo');

    if (rol === 4) {
      dropCosteo.innerHTML = `
        <a href="#" onclick="cargar('../producto/telas-insumos.html',this)">
          <i class="ri-ruler-line"></i> Telas & Insumos
        </a>
        <a href="#" onclick="cargar('../producto/consolidado.html',this)">
          <i class="ri-bar-chart-line"></i> Consolidado
        </a>`;
      document.getElementById('secUsuarios').style.display    = 'flex';
      document.getElementById('secCosteo').style.display      = 'flex';
      document.getElementById('secReportes').style.display    = 'flex';
      // Soporte rol 4 — solo Gestión de Tickets
      const secSoporte4 = document.getElementById('secSoporte');
      secSoporte4.innerHTML = `
        <button class="tn-btn" onclick="cargar('../soporte/Soporte_Admin.html',this)">
          <i class="ri-list-check"></i> Soporte
        </button>`;
      document.getElementById('labelCosteo').textContent = 'Administrador';
    }

    if (rol === 1) {
      // Una sola opción — botón directo sin dropdown
      document.getElementById('secReportes').style.display = 'flex';
      const secCosteo = document.getElementById('secCosteo');
      secCosteo.style.display = 'flex';
      secCosteo.innerHTML = `
        <button class="tn-btn" onclick="cargar('../producto/telas-insumos.html',this)">
          <i class="ri-ruler-line"></i> Materia Prima
        </button>`;
    }

    if (rol === 2) {
      // Una sola opción — botón directo sin dropdown
      document.getElementById('secReportes').style.display = 'flex';
      const secCosteo2 = document.getElementById('secCosteo');
      secCosteo2.style.display = 'flex';
      secCosteo2.innerHTML = `
        <button class="tn-btn" onclick="cargar('../producto/consolidado.html',this)">
          <i class="ri-bar-chart-line"></i> Costeo
        </button>`;
    }

    window.kikaToken   = sesion.token;
    window.kikaUsuario = sesion.usuario;
    window.kikaRol     = parseInt(sesion.rol);

    function cargar(pagina, enlace) {
      document.getElementById('frame').src = pagina;
      document.querySelectorAll('.tn-dropdown a, .tn-btn')
        .forEach(a => a.classList.remove('active'));
      if (enlace) enlace.classList.add('active');
    }

    // ── Click toggle para dropdowns ────────────────────────────────────
    document.querySelectorAll('.tn-group').forEach(group => {
      const btn = group.querySelector('.tn-btn');
      const dd  = group.querySelector('.tn-dropdown');
      if (!btn || !dd) return;

      btn.addEventListener('click', e => {
        e.stopPropagation();
        const isOpen = group.classList.contains('dd-open');
        // Cerrar todos los demás
        document.querySelectorAll('.tn-group.dd-open').forEach(g => g.classList.remove('dd-open'));
        if (!isOpen) group.classList.add('dd-open');
      });
    });

    // Clic fuera cierra todos
    document.addEventListener('click', () => {
      document.querySelectorAll('.tn-group.dd-open').forEach(g => g.classList.remove('dd-open'));
    });

    // Clic en link del dropdown cierra el menú
    document.querySelectorAll('.tn-dropdown a').forEach(a => {
      a.addEventListener('click', () => {
        document.querySelectorAll('.tn-group.dd-open').forEach(g => g.classList.remove('dd-open'));
      });
    });

    document.getElementById('btnSalir').addEventListener('click', async () => {
      const ok = await confirmar('¿Deseas cerrar la sesión?', 'warning', 'Salir');
      if (!ok) return;
      sessionStorage.clear();
      window.location.href = '../../index.html';
    });
  </script>

  <!-- 3. Menú móvil AL FINAL — ya tiene los roles aplicados -->
  <script src="../../js/navbar-mobile.js"></script>

</body>
</html>
