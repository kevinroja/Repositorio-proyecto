<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Kika — Panel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../css/kika.css">
</head>

<body class="page-shell">

  <!-- NAVBAR -->
  <div class="navbar">
    <img src="../../img/LOGO BLANCO.png" alt="Kika" class="logo"
         onerror="this.src='../../img/LOGO NEGRO.png'">
    <div class="navbar-right">
      <div class="user-badge">
        <i class="ri-user-line"></i>
        <span id="nombreUsuario">—</span>
        <span id="rolUsuario" style="opacity:.6;font-size:11px;margin-left:4px"></span>
      </div>
      <button class="btn-logout" id="btnSalir">
        <i class="ri-logout-box-line"></i> Salir
      </button>
    </div>
  </div>

  <!-- SHELL -->
  <div class="shell-body">

    <!-- SIDEBAR — las secciones se muestran según el rol -->
    <div class="sidebar">

      <!-- Solo Administrador (rol 4) -->
      <div class="sidebar-section" id="secUsuarios" style="display:none">
        <div class="sidebar-title">
          <i class="ri-user-settings-line"></i> Usuarios
        </div>
        <ul class="sidebar-menu">
          <li><a href="#" onclick="cargar('../auth/Creacion_Usuario.html',this)" class="active">
            <i class="ri-user-add-line"></i> Crear Usuario
          </a></li>
          <li><a href="#" onclick="cargar('../auth/Eliminar_Usuario.html',this)">
            <i class="ri-user-unfollow-line"></i> Eliminar Usuario
          </a></li>
          <li><a href="#" onclick="cargar('../auth/Bloquear_Usuario.html',this)">
            <i class="ri-user-forbid-line"></i> Bloquear / Desbloquear
          </a></li>
        </ul>
      </div>

      <!-- Visible para todos -->
      <div class="sidebar-section">
        <div class="sidebar-title">
          <i class="ri-customer-service-2-line"></i> Soporte
        </div>
        <ul class="sidebar-menu">
          <li><a href="#" onclick="cargar('../soporte/Soporte.html',this)">
            <i class="ri-tools-line"></i> Soporte Técnico
          </a></li>
          <!-- Solo Admin ve el panel de gestión de tickets -->
          <li id="liSoporteAdmin" style="display:none">
            <a href="#" onclick="cargar('../soporte/Soporte_Admin.html',this)">
              <i class="ri-list-check"></i> Gestión de Tickets
            </a>
          </li>
        </ul>
      </div>

    </div>

    <!-- CONTENIDO -->
    <div class="content-panel">
      <iframe id="frame" src="../auth/Creacion_Usuario.html"></iframe>
    </div>

  </div>

  <script src="../../js/kika.js"></script>
  <script>
    /* ── 1. Guard: verifica sesión. Solo Admin puede entrar aquí ── */
    const sesion = requireAuth([4]);
    // requireAuth redirige automáticamente si no hay token o el rol no es 4

    /* ── 2. Mostrar datos del usuario en el navbar ── */
    document.getElementById('nombreUsuario').textContent = sesion.usuario.Nombre;
    document.getElementById('rolUsuario').textContent    = ROLES[sesion.rol] || '';

    /* ── 3. Mostrar secciones según el rol ──────── */
    if (sesion.rol === 4) {
      document.getElementById('secUsuarios').style.display      = 'block';
      document.getElementById('liSoporteAdmin').style.display   = 'list-item';
    }

    /* ── 4. Exponer datos de sesión a los iframes ── */
    window.kikaToken   = sesion.token;
    window.kikaUsuario = sesion.usuario;
    window.kikaRol     = sesion.rol;

    /* ── 5. Navegación del sidebar ──────────────── */
    function cargar(pagina, enlace) {
      document.getElementById('frame').src = pagina;
      document.querySelectorAll('.sidebar-menu a').forEach(a => a.classList.remove('active'));
      enlace.classList.add('active');
    }

    /* ── 6. Cerrar sesión con modal de confirmación ── */
    document.getElementById('btnSalir').addEventListener('click', async () => {
      const ok = await confirmar('¿Deseas cerrar la sesión?', 'warning', 'Salir');
      if (!ok) return;
      sessionStorage.clear();
      window.location.href = '../../index.html';
    });
  </script>

</body>
</html>
